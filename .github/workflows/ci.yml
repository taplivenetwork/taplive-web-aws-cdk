name: CI – CDK Synth & Diff

on:
  pull_request:
    branches:
      - main

permissions:
  id-token: write   # Required for OIDC
  contents: read
  pull-requests: write

jobs:
  cdk-diff:
    name: CDK Synth & Diff
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK Synth (validate)
        run: npx cdk synth

      - name: CDK Diff (post to PR)
        run: npx cdk diff 2>&1 | tee cdk-diff-output.txt

      - name: Comment diff on PR
        uses: actions/github-script@v7
        if: always()
        with:
          script: |
            const fs = require('fs');
            const diff = fs.readFileSync('cdk-diff-output.txt', 'utf8');
            const body = `## CDK Diff\n\`\`\`\n${diff.slice(0, 60000)}\n\`\`\``;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body,
            });
