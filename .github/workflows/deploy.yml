name: CD – CDK Deploy

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      stack:
        description: "taplive-web-stack"
        required: false
        default: ""

permissions:
  id-token: write   # Required for OIDC
  contents: read

jobs:
  cdk-deploy:
    name: CDK Deploy
    runs-on: ubuntu-latest
    environment: production   # Enables required reviewers / env protection rules

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build TypeScript
        run: npm run build

      - name: Configure AWS credentials (OIDC)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ secrets.AWS_DEPLOY_ROLE_ARN }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: CDK Bootstrap (idempotent)
        run: npx cdk bootstrap aws://${{ secrets.AWS_ACCOUNT_ID }}/${{ secrets.AWS_REGION }}

      - name: CDK Deploy
        run: |
          STACK="${{ github.event.inputs.stack }}"
          if [ -n "$STACK" ]; then
            npx cdk deploy "$STACK" --require-approval never
          else
            npx cdk deploy --all --require-approval never
        env:
          # Pass any app-level env vars your CDK app reads at synth time
          NODE_ENV: production
